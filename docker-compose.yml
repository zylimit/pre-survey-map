# pre-survey-map V1 — 本地一键启动
# 启动：docker compose up -d --build
# 前端：http://localhost:5173 （Nginx 反代 /api/* → api:8000）
# 后端：http://localhost:8000/health
# 数据库：localhost:5433（宿主映射；容器内仍是 5432。首次启动自动跑 deploy/db/init.sql）

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: presurvey-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-presurvey}
    ports:
      - "5433:5432"
    volumes:
      - presurvey_pgdata:/var/lib/postgresql/data
      - ./deploy/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-presurvey}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
    container_name: presurvey-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-presurvey}
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
    container_name: presurvey-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  presurvey_pgdata:
