<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pre-Survey Map</title>
    <!-- #19 双主题：渲染前定 data-theme，默认 dark，避免亮/暗闪烁（FOUC）-->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("presurvey.theme");
          document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <!-- F18 双语：渲染前定 data-lang，默认 en，避免 FOUC -->
    <script>
      (function () {
        try {
          var l = localStorage.getItem("presurvey.lang");
          document.documentElement.setAttribute("data-lang", l === "zh" ? "zh" : "en");
        } catch (e) {
          document.documentElement.setAttribute("data-lang", "en");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
